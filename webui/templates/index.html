<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Cog 监控面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        header p {
            color: #888;
            margin-top: 10px;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        .card h2 {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #00d2ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card h2 .icon {
            font-size: 1.4em;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .stat-item {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-item .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #fff;
        }
        
        .stat-item .label {
            font-size: 0.85em;
            color: #888;
            margin-top: 5px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-indicator.active {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }
        
        .status-indicator.inactive {
            background: #ff4444;
        }
        
        .interaction-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        .interaction-panel h2 {
            margin-bottom: 15px;
            color: #00d2ff;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .input-group input {
            flex: 1;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1em;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #00d2ff;
        }
        
        .input-group button {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .input-group button:hover {
            transform: scale(1.05);
        }
        
        .output-area {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            min-height: 100px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        
        .module-list {
            list-style: none;
        }
        
        .module-list li {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .module-list li:last-child {
            border-bottom: none;
        }
        
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,210,255,0.4);
            transition: transform 0.2s;
        }
        
        .refresh-btn:hover {
            transform: rotate(90deg);
        }
        
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 M-Cog</h1>
            <p>Meta-Cognitive Autonomous Evolutionary System</p>
        </header>
        
        <div class="interaction-panel">
            <h2>💬 交互测试</h2>
            <div class="input-group">
                <input type="text" id="userInput" placeholder="输入您的问题..." />
                <button onclick="processInput()">发送</button>
            </div>
            <div class="output-area" id="outputArea">
等待输入...
            </div>
        </div>
        
        <div class="dashboard">
            <!-- 系统状态卡片 -->
            <div class="card">
                <h2><span class="icon">⚙️</span> 系统状态</h2>
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="value" id="runningStatus">-</div>
                        <div class="label">运行状态</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="version">-</div>
                        <div class="label">版本</div>
                    </div>
                </div>
                <ul class="module-list" id="moduleList">
                    <li>加载中...</li>
                </ul>
            </div>
            
            <!-- 知识库卡片 -->
            <div class="card">
                <h2><span class="icon">📚</span> 知识库</h2>
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="value" id="nodeCount">-</div>
                        <div class="label">知识节点</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="relationCount">-</div>
                        <div class="label">知识关系</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="quarantineCount">-</div>
                        <div class="label">待审核</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="valueCount">-</div>
                        <div class="label">价值条目</div>
                    </div>
                </div>
            </div>
            
            <!-- 记忆系统卡片 -->
            <div class="card">
                <h2><span class="icon">🧠</span> 记忆系统</h2>
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="value" id="episodeCount">-</div>
                        <div class="label">情景记忆</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="avgImportance">-</div>
                        <div class="label">平均重要性</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="avgSatisfaction">-</div>
                        <div class="label">平均满意度</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="turnCount">-</div>
                        <div class="label">当前轮次</div>
                    </div>
                </div>
            </div>
            
            <!-- 工具工厂卡片 -->
            <div class="card">
                <h2><span class="icon">🔧</span> 工具工厂</h2>
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="value" id="toolCount">-</div>
                        <div class="label">工具总数</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="activeTools">-</div>
                        <div class="label">活跃工具</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="toolUsage">-</div>
                        <div class="label">总使用次数</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="toolSuccessRate">-</div>
                        <div class="label">成功率</div>
                    </div>
                </div>
            </div>
            
            <!-- 专家系统卡片 -->
            <div class="card">
                <h2><span class="icon">🎓</span> 专家系统</h2>
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="value" id="expertCount">-</div>
                        <div class="label">专家数量</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="maxExperts">-</div>
                        <div class="label">最大激活</div>
                    </div>
                </div>
                <ul class="module-list" id="expertList">
                    <li>加载中...</li>
                </ul>
            </div>
            
            <!-- 元认知卡片 -->
            <div class="card">
                <h2><span class="icon">🎯</span> 元认知</h2>
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="value" id="errorTrend">-</div>
                        <div class="label">误差趋势</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="satisfactionTrend">-</div>
                        <div class="label">满意度趋势</div>
                    </div>
                </div>
                <ul class="module-list" id="alertList">
                    <li>无告警</li>
                </ul>
            </div>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="refreshStatus()">🔄</button>
    
    <script>
        // 刷新状态
        async function refreshStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                updateDashboard(data);
            } catch (error) {
                console.error('Failed to fetch status:', error);
            }
        }
        
        // 更新仪表板
        function updateDashboard(data) {
            // 系统状态
            document.getElementById('runningStatus').innerHTML = 
                `<span class="status-indicator ${data.running ? 'active' : 'inactive'}"></span>${data.running ? '运行中' : '已停止'}`;
            document.getElementById('version').textContent = data.config?.version || '-';
            
            // 模块状态
            const moduleList = document.getElementById('moduleList');
            moduleList.innerHTML = '';
            for (const [name, active] of Object.entries(data.modules || {})) {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${name}</span>
                    <span class="status-indicator ${active ? 'active' : 'inactive'}"></span>
                `;
                moduleList.appendChild(li);
            }
            
            // 知识库
            if (data.knowledge_stats) {
                document.getElementById('nodeCount').textContent = data.knowledge_stats.nodes || 0;
                document.getElementById('relationCount').textContent = data.knowledge_stats.relations || 0;
                document.getElementById('quarantineCount').textContent = data.knowledge_stats.pending_quarantine || 0;
                document.getElementById('valueCount').textContent = data.knowledge_stats.values || 0;
            }
            
            // 记忆系统
            if (data.memory_stats) {
                const epStats = data.memory_stats.episodic_stats || {};
                document.getElementById('episodeCount').textContent = epStats.total_episodes || 0;
                document.getElementById('avgImportance').textContent = 
                    (epStats.avg_importance || 0).toFixed(2);
                document.getElementById('avgSatisfaction').textContent = 
                    (epStats.avg_satisfaction || 0).toFixed(2);
                
                const wm = data.memory_stats.working_memory || {};
                document.getElementById('turnCount').textContent = wm.turn_count || 0;
            }
            
            // 工具工厂
            if (data.tool_stats) {
                document.getElementById('toolCount').textContent = data.tool_stats.total_tools || 0;
                document.getElementById('activeTools').textContent = data.tool_stats.active_tools || 0;
                document.getElementById('toolUsage').textContent = data.tool_stats.total_usage || 0;
                document.getElementById('toolSuccessRate').textContent = 
                    ((data.tool_stats.overall_success_rate || 0) * 100).toFixed(0) + '%';
            }
            
            // 元认知
            if (data.meta_status) {
                const monitor = data.meta_status.monitor || {};
                const trends = monitor.trends || {};
                document.getElementById('errorTrend').textContent = 
                    ((trends.prediction_error || 0) * 100).toFixed(1) + '%';
                document.getElementById('satisfactionTrend').textContent = 
                    ((trends.satisfaction || 0) * 100).toFixed(1) + '%';
                
                const alertList = document.getElementById('alertList');
                alertList.innerHTML = '';
                const alerts = monitor.alerts || [];
                if (alerts.length > 0) {
                    alerts.forEach(alert => {
                        const li = document.createElement('li');
                        li.style.color = '#ff6b6b';
                        li.textContent = '⚠️ ' + alert;
                        alertList.appendChild(li);
                    });
                } else {
                    alertList.innerHTML = '<li style="color: #00ff88">✓ 无告警</li>';
                }
            }
        }
        
        // 处理输入
        async function processInput() {
            const input = document.getElementById('userInput').value;
            if (!input.trim()) return;
            
            const outputArea = document.getElementById('outputArea');
            outputArea.textContent = '处理中...';
            
            try {
                const response = await fetch('/api/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input: input })
                });
                const data = await response.json();
                outputArea.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                outputArea.textContent = 'Error: ' + error.message;
            }
            
            // 刷新状态
            refreshStatus();
        }
        
        // 回车发送
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                processInput();
            }
        });
        
        // 初始加载
        refreshStatus();
        // 定时刷新
        setInterval(refreshStatus, 5000);
    </script>
</body>
</html>
